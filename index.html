<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Erimworks — Yakında / Coming Soon</title>
  <meta name="description" content="Erimworks — mobil uygulamalar ve oyunlar. Tüm işlerimiz yakında tek çatı altında. Mobile apps & games, all under one roof. Coming soon." />
  <meta property="og:title" content="Erimworks" />
  <meta property="og:description" content="Mobil uygulamalar ve oyunlar — yakında. Mobile apps & games — coming soon." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#05070d" />
  <style>
    :root {
      --bg: #05070d;
      --fg: #eef1f8;
      --muted: #93a0b8;
      --line: rgba(255,255,255,0.08);
      --c1: #4f8cff;
      --c2: #a855f7;
      --c3: #22d3ee;
      --glass: rgba(255,255,255,0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100svh;
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- animated aurora background ---- */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
      will-change: transform;
    }
    .orb.a { width: 46vmax; height: 46vmax; left: -12vmax; top: -14vmax;
      background: radial-gradient(circle at 30% 30%, var(--c1), transparent 62%);
      animation: drift1 22s ease-in-out infinite; }
    .orb.b { width: 40vmax; height: 40vmax; right: -12vmax; top: -6vmax;
      background: radial-gradient(circle at 50% 50%, var(--c2), transparent 62%);
      animation: drift2 26s ease-in-out infinite; }
    .orb.c { width: 42vmax; height: 42vmax; left: 20vmax; bottom: -20vmax;
      background: radial-gradient(circle at 50% 50%, var(--c3), transparent 62%);
      animation: drift3 30s ease-in-out infinite; }
    @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(8vmax,6vmax) scale(1.12)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-7vmax,7vmax) scale(1.08)} }
    @keyframes drift3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(6vmax,-8vmax) scale(1.14)} }

    /* subtle grain + vignette */
    body::after {
      content: ""; position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(120% 80% at 50% 30%, transparent 40%, rgba(0,0,0,0.55) 100%),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/></svg>");
    }

    /* ---- layout ---- */
    .stage {
      position: relative; z-index: 2;
      min-height: 100svh;
      display: grid; place-items: center;
      padding: 40px 22px;
      text-align: center;
    }
    .wrap { max-width: 680px; width: 100%; }

    .badge {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 7px 14px; border: 1px solid var(--line);
      border-radius: 999px; background: var(--glass);
      backdrop-filter: blur(10px);
      font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 30px;
    }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--c3);
      box-shadow: 0 0 0 0 rgba(34,211,238,0.6); animation: pulse 2.2s infinite; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(34,211,238,0.55)} 70%{box-shadow:0 0 0 12px rgba(34,211,238,0)} 100%{box-shadow:0 0 0 0 rgba(34,211,238,0)} }

    .brand {
      font-size: clamp(3rem, 12vw, 6.5rem);
      font-weight: 800; letter-spacing: -0.045em; line-height: 0.95;
      background: linear-gradient(100deg, #ffffff 10%, var(--c1) 45%, var(--c2) 70%, var(--c3) 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      background-size: 200% auto; animation: sheen 8s linear infinite;
    }
    .brand .dot { color: var(--c3); -webkit-text-fill-color: var(--c3); }
    @keyframes sheen { to { background-position: 200% center; } }

    .headline {
      margin-top: 26px; font-size: clamp(1.15rem, 3.4vw, 1.7rem);
      font-weight: 600; letter-spacing: -0.01em; line-height: 1.35;
    }
    .sub { margin-top: 16px; color: var(--muted); font-size: clamp(0.95rem, 2.2vw, 1.05rem); line-height: 1.65; }

    .chips { margin-top: 34px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .chip {
      padding: 9px 16px; border: 1px solid var(--line); border-radius: 12px;
      background: var(--glass); color: var(--fg); font-size: 0.9rem;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .chip svg { width: 16px; height: 16px; opacity: 0.9; }

    /* language toggle */
    .lang {
      position: fixed; top: 20px; right: 20px; z-index: 3;
      display: inline-flex; border: 1px solid var(--line); border-radius: 999px;
      background: var(--glass); backdrop-filter: blur(10px); overflow: hidden;
    }
    .lang button {
      appearance: none; border: 0; background: transparent; cursor: pointer;
      color: var(--muted); font: inherit; font-size: 0.78rem; font-weight: 700;
      padding: 8px 14px; letter-spacing: 0.06em; transition: color .2s, background .2s;
    }
    .lang button[aria-pressed="true"] { color: #fff; background: rgba(255,255,255,0.10); }

    footer { margin-top: 44px; color: #67728a; font-size: 0.82rem; }
    footer a { color: #8aa0c6; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .2s; }
    footer a:hover { border-bottom-color: #8aa0c6; }

    /* entrance */
    .reveal { opacity: 0; transform: translateY(14px); animation: rise .9s cubic-bezier(.2,.7,.2,1) forwards; }
    .d1 { animation-delay: .05s } .d2 { animation-delay: .18s } .d3 { animation-delay: .31s }
    .d4 { animation-delay: .44s } .d5 { animation-delay: .57s } .d6 { animation-delay: .7s }
    @keyframes rise { to { opacity: 1; transform: none; } }

    @media (prefers-reduced-motion: reduce) {
      .orb, .brand, .pulse { animation: none !important; }
      .reveal { animation: none !important; opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="orb a"></div>
  <div class="orb b"></div>
  <div class="orb c"></div>

  <nav class="lang" aria-label="Language">
    <button id="tr" aria-pressed="true">TR</button>
    <button id="en" aria-pressed="false">EN</button>
  </nav>

  <main class="stage">
    <div class="wrap">
      <span class="badge reveal d1">
        <span class="pulse"></span>
        <span data-tr="Yakında" data-en="Coming soon">Yakında</span>
      </span>

      <h1 class="brand reveal d2">erimworks<span class="dot">.</span></h1>

      <p class="headline reveal d3"
         data-tr="Tüm işlerimiz yakında tek çatı altında."
         data-en="All of our work — soon, under one roof.">Tüm işlerimiz yakında tek çatı altında.</p>

      <p class="sub reveal d4"
         data-tr="Mobil uygulamalar ve oyunlar tasarlıyor, geliştiriyoruz. Yeni projelerimiz çok yakında burada."
         data-en="We design and build mobile apps and games. New projects are landing here very soon.">
        Mobil uygulamalar ve oyunlar tasarlıyor, geliştiriyoruz. Yeni projelerimiz çok yakında burada.
      </p>

      <div class="chips reveal d5">
        <span class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M7 12h3M8.5 10.5v3"/><circle cx="16" cy="11" r="1"/><circle cx="18.5" cy="13.5" r="1"/></svg>
          <span data-tr="Oyunlar" data-en="Games">Oyunlar</span>
        </span>
        <span class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="3"/><path d="M11 18h2"/></svg>
          <span data-tr="Uygulamalar" data-en="Apps">Uygulamalar</span>
        </span>
        <span class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L4 17v3h3l5.3-5.3a4 4 0 0 0 5.4-5.4l-2.6 2.6-2-2 2.6-2.6z"/></svg>
          <span data-tr="Araçlar" data-en="Tools">Araçlar</span>
        </span>
      </div>

      <footer class="reveal d6">
        © <span id="y"></span> Erimworks ·
        <a href="mailto:uc.erim@gmail.com" data-tr="İletişim" data-en="Get in touch">İletişim</a>
      </footer>
    </div>
  </main>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();

    var nodes = document.querySelectorAll('[data-tr]');
    var btnTR = document.getElementById('tr');
    var btnEN = document.getElementById('en');

    function setLang(lang) {
      nodes.forEach(function (n) {
        var v = n.getAttribute('data-' + lang);
        if (v != null) n.textContent = v;
      });
      document.documentElement.lang = lang;
      btnTR.setAttribute('aria-pressed', String(lang === 'tr'));
      btnEN.setAttribute('aria-pressed', String(lang === 'en'));
      try { localStorage.setItem('ew_lang', lang); } catch (e) {}
    }

    var saved = null;
    try { saved = localStorage.getItem('ew_lang'); } catch (e) {}
    var initial = saved || ((navigator.language || 'tr').toLowerCase().indexOf('tr') === 0 ? 'tr' : 'en');
    setLang(initial);

    btnTR.addEventListener('click', function () { setLang('tr'); });
    btnEN.addEventListener('click', function () { setLang('en'); });
  </script>
</body>
</html>
