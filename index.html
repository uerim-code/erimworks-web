<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Erimworks</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b0f17;
      color: #e6e9ef;
      padding: 24px;
      text-align: center;
    }
    .wrap { max-width: 520px; }
    h1 { font-size: 2.25rem; letter-spacing: -0.02em; margin-bottom: 12px; }
    p { color: #9aa3b2; line-height: 1.6; }
    .dot { color: #4f8cff; }
    footer { margin-top: 28px; font-size: 0.85rem; color: #6b7280; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Erimworks<span class="dot">.</span></h1>
    <p>Mobil uygulamalar ve dijital işler. Site yakında burada olacak.</p>
    <footer>© <span id="y"></span> Erimworks</footer>
  </div>
  <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
